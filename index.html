<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOTV® 火视网 - 全球热门短剧 INITIALIZED</title>
    <style>
        :root {
            --primary-red: #E60012;
            --fire-orange: #FF4D00;
            --deep-black: #000000;
            --legal-gray: #333;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', sans-serif;
            background-color: var(--deep-black);
            color: white;
            overflow-x: hidden;
            height: 100%;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a0000 0%, #000000 100%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            padding-top: 10vh;
        }

        /* 核心品牌展示区 */
        .brand-hub {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 60px;
        }

        /* 专门用于生成粒子火焰的画布：加大体积 */
        #fireCanvas {
            height: 250px; /* 大体积标识 */
            width: auto;
            filter: drop-shadow(0 0 50px rgba(230, 0, 18, 0.5));
            z-index: 2;
            
            /* 关键修改：实体旋转效果 */
            animation: fireRotate 10s infinite linear;
        }

        /* 实体旋转动效 */
        @keyframes fireRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 文字内容：保持域名轴心居中，小点靠拢 */
        .hero-title-text {
            text-align: center;
            width: 100%;
            /* 关键调整：负边距向上靠拢协调 */
            margin-top: -60px; 
            position: relative;
            z-index: 3;
        }

        .super-domain {
            font-size: 38pt; /* 域名缩小协调 */
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0;
            color: #ffffff;
            text-transform: uppercase;
            opacity: 0.95;
            line-height: 1;
        }

        .chinese-brand {
            font-size: 20pt;
            font-weight: bold;
            color: var(--primary-red);
            letter-spacing: 12px;
            margin-top: 8px;
            text-indent: 12px;
            opacity: 0.9;
        }

        /* 热门短剧宣传 */
        .promo-text {
            margin-top: 60px;
            font-size: 16pt;
            font-weight: 200;
            color: #ddd;
            letter-spacing: 6px;
            background: linear-gradient(90deg, #444, #fff, #444);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .contact-section {
            margin-top: 100px;
            padding-bottom: 100px;
        }

        .contact-email {
            font-size: 20pt;
            color: #ffffff;
            text-decoration: none;
            font-weight: 200;
            transition: 0.3s;
            opacity: 0.8;
        }

        .contact-email:hover {
            color: var(--primary-red);
            opacity: 1;
        }

        footer {
            padding: 80px 20px;
            background: #000;
            border-top: 1px solid #111;
            text-align: center;
        }

        .legal-notice {
            font-size: 8pt;
            color: var(--legal-gray);
            max-width: 900px;
            margin: 0 auto;
            line-height: 2.2;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            #fireCanvas { height: 180px; }
            .hero-title-text { margin-top: -40px; }
            .super-domain { font-size: 26pt; }
            .chinese-brand { font-size: 16pt; }
            .promo-text { font-size: 12pt; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="container">
    <div class="hero-section">
        <div class="brand-hub">
            <canvas id="fireCanvas" width="200" height="250"></canvas>
            
            <div class="hero-title-text">
                <h1 class="super-domain">FOTV.COM</h1>
                <div class="chinese-brand">火视网</div>
            </div>
        </div>

        <div class="promo-text">热门短剧赛道 · 全球流量分发 · 震撼启动</div>
    </div>

    <div class="contact-section">
        <div style="color: #222; font-size: 8pt; margin-bottom: 10px; letter-spacing: 2px;">STRATEGIC INQUIRIES</div>
        <a href="mailto:cengchengzhi@gmail.com" class="contact-email">cengchengzhi@gmail.com</a>
    </div>
</div>

<footer>
    <div class="legal-notice">
        © 2026 FOTV MEDIA NETWORKS. ALL RIGHTS RESERVED. <br>
        GLOBAL DOMAIN: FOTV.COM | REGISTERED TRADEMARK: FOTV® (CLASS 35) <br>
        BEIJING / LONDON / SILICON VALLEY
    </div>
</footer>

<script>
(function() {
    const canvas = document.getElementById('fireCanvas');
    const ctx = canvas.getContext('2d');
    
    // 设置粒子数据
    const particles = [];
    const particleCount = 2500; // 粒子数量，决定实体感
    
    // 初始化画布分辨率
    canvas.width = 200;
    canvas.height = 250;

    class Particle {
        constructor() {
            this.reset();
        }

        reset() {
            // 火焰实体核心位置
            this.x = canvas.width / 2;
            this.y = canvas.height * 0.8; 
            
            // 实体粒子速度与扩散
            this.vx = (Math.random() - 0.5) * 1.5;
            this.vy = -(Math.random() * 3 + 1);
            this.life = Math.random() * 0.5 + 0.5;
            this.size = Math.random() * 4 + 1;
            
            // 实体颜色渐变：核心金黄，外围鲜红
            this.r = 230;
            this.g = Math.floor(Math.random() * 150 + 50);
            this.b = 18;
            this.a = 0.8;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= 0.015;
            this.size *= 0.98; // 粒子向上燃烧时变小
            
            if (this.life <= 0 || this.size <= 0.2 || this.y < 0) {
                this.reset();
            }
        }

        draw() {
            ctx.globalCompositeOperation = 'lighter'; // 叠加模式，增加发光感
            ctx.fillStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${this.a * this.life})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (let particle of particles) {
            particle.update();
            particle.draw();
        }
        
        requestAnimationFrame(animate);
    }

    animate();
})();
</script>

</body>
</html>
