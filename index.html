<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOTV® 火视网 - 全球热门短剧平台</title>
    <style>
        :root {
            --primary-red: #E60012;
            --deep-black: #000000;
            --legal-gray: #333;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', sans-serif;
            background-color: var(--deep-black);
            color: white;
            overflow-x: hidden;
            height: 100%;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a0000 0%, #000000 100%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            padding-top: 10vh;
        }

        /* 核心品牌展示区 */
        .brand-hub {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 60px;
            position: relative;
        }

        /* 视觉对齐容器 */
        .brand-align-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            display: inline-flex;
            position: relative;
        }

        /* 燃烧的火标识 - 保持大气尺寸 */
        .hero-logo-svg {
            height: 200px;
            width: auto;
            filter: drop-shadow(0 0 35px rgba(230, 0, 18, 0.5));
            z-index: 2;
            position: relative;
            margin-left: -50px; /* 火焰微调向左，与文字视觉对齐 */
        }

        /* 火焰原地燃烧动画 */
        .fire-path {
            fill: var(--primary-red);
            mask-image: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
            mask-size: 100% 200%;
            -webkit-mask-size: 100% 200%;
            animation: fireFlowing 2.5s infinite linear;
        }

        @keyframes fireFlowing {
            from { mask-position: 0% 100%; -webkit-mask-position: 0% 100%; }
            to { mask-position: 0% -100%; -webkit-mask-position: 0% -100%; }
        }

        /* 核心域名 - 缩小并向上靠拢 */
        .super-domain {
            font-size: 38pt; 
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0;
            color: #ffffff;
            text-transform: uppercase;
            opacity: 0.95;
            margin-top: -30px; /* 极致靠拢 */
            position: relative;
            z-index: 1;
        }

        /* 域名下的中文名 */
        .chinese-brand {
            font-size: 20pt;
            font-weight: bold;
            color: var(--primary-red);
            letter-spacing: 12px;
            margin-top: 5px;
            text-indent: 12px;
            opacity: 0.9;
        }

        /* 热门短剧宣传文字 */
        .promo-text {
            margin-top: 50px;
            font-size: 16pt;
            font-weight: 200;
            color: #ddd;
            letter-spacing: 6px;
            background: linear-gradient(90deg, #444, #fff, #444);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .contact-section {
            margin-top: 80px;
            padding-bottom: 80px;
        }

        .contact-email {
            font-size: 18pt;
            color: #ffffff;
            text-decoration: none;
            font-weight: 200;
            transition: 0.3s;
            opacity: 0.8;
        }

        .contact-email:hover {
            color: var(--primary-red);
            opacity: 1;
        }

        footer {
            padding: 80px 20px;
            background: #000;
            border-top: 1px solid #111;
            text-align: center;
        }

        .legal-notice {
            font-size: 8pt;
            color: var(--legal-gray);
            max-width: 900px;
            margin: 0 auto;
            line-height: 2.2;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .hero-logo-svg { height: 140px; margin-left: 0; }
            .super-domain { font-size: 26pt; margin-top: -20px; }
            .chinese-brand { font-size: 16pt; }
            .promo-text { font-size: 12pt; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="container">
    <div class="hero-section">
        <div class="brand-hub">
            <div class="brand-align-block">
                <div class="logo-wrapper">
                    <svg class="hero-logo-svg" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
                        <path class="fire-path" d="M100 25 Q120 -5 140 25 T170 25 Q180 55 150 85 L120 105 L90 85 Q60 55 80 25" />
                        <polygon points="110,50 110,80 135,65" fill="white" />
                    </svg>
                </div>

                <h1 class="super-domain">FOTV.COM</h1>
                <div class="chinese-brand">火视网</div>
            </div>
        </div>

        <div class="promo-text">热门短剧赛道 · 全球流量分发 · 2026 INITIALIZED</div>
    </div>

    <div class="contact-section">
        <div style="color: #222; font-size: 8pt; margin-bottom: 10px; letter-spacing: 2px;">INQUIRIES</div>
        <a href="mailto:cengchengzhi@gmail.com" class="contact-email">cengchengzhi@gmail.com</a>
    </div>
</div>

<footer>
    <div class="legal-notice">
        © 2026 FOTV MEDIA NETWORKS. ALL RIGHTS RESERVED. <br>
        GLOBAL ASSET: FOTV.COM | REGISTERED TRADEMARK: FOTV® (CLASS 35) <br>
        PROTECTED IN BEIJING / LONDON / SILICON VALLEY
    </div>
</footer>

</body>
</html>
