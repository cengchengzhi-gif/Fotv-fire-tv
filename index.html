<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOTV.COM® | MARS NARRATIVE INITIALIZED</title>
    <style>
        :root {
            --mars-red: #E60012;
            --mars-glow: #ff4500;
            --white-glow: rgba(255, 255, 255, 0.8);
            --tech-purple: #C084FC;
            --tech-silver: #FFFFFF;
            --deep-black: #000000;
            --legal-gray: #1a1a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--deep-black);
            color: white;
            overflow-x: hidden;
            height: 100%;
        }

        /* 宇宙深空背景 */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #150005 0%, #000000 100%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            padding-top: 6vh; 
        }

        /* 核心品牌区 */
        .brand-hub {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* 电视标识 */
        .hero-logo-svg {
            height: 170px; 
            width: auto;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.2));
            z-index: 2;
        }

        /* 火星旋转动效 */
        .mars-sphere-core {
            fill: url(#marsSphere);
            transform-origin: center;
            animation: marsRotate 15s infinite linear;
        }

        @keyframes marsRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 品牌文字：极速靠拢 */
        .hero-title-text {
            margin-top: 5px; 
            position: relative;
            z-index: 3;
        }

        .super-domain {
            font-size: 26pt; 
            font-weight: 900;
            letter-spacing: 1px;
            margin: 0;
            background: linear-gradient(180deg, var(--tech-silver) 30%, var(--tech-purple) 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase; 
            line-height: 1;
        }

        .chinese-brand {
            font-size: 18pt; 
            font-weight: bold;
            color: var(--mars-red);
            letter-spacing: 14px;
            margin-top: 5px;
            text-indent: 14px;
            opacity: 0.9;
        }

        /* 叙事区 */
        .mars-narrative {
            margin-top: 70px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .glow-statement {
            font-size: 12pt;
            font-weight: 200;
            color: var(--mars-glow);
            letter-spacing: 4px;
            line-height: 2.2;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 69, 0, 0.5);
            animation: pulseGlow 4s infinite alternate;
        }

        @keyframes pulseGlow {
            from { opacity: 0.6; text-shadow: 0 0 8px rgba(255, 69, 0, 0.3); }
            to { opacity: 0.95; text-shadow: 0 0 18px rgba(255, 69, 0, 0.7); }
        }

        .sub-narrative {
            font-size: 9pt;
            color: #333;
            letter-spacing: 2px;
            line-height: 1.8;
            margin-top: 25px;
            font-weight: 200;
        }

        /* 底部置底 */
        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 40px 0;
            text-align: center;
        }

        /* 亮白发光邮件 */
        .contact-email {
            display: block;
            font-size: 10pt;
            color: #ffffff;
            text-decoration: none;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-weight: 300;
            /* 亮白霓虹效果 */
            text-shadow: 0 0 8px var(--white-glow), 0 0 20px rgba(255, 255, 255, 0.3);
            animation: whitePulse 3s infinite alternate;
            transition: 0.3s;
        }

        .contact-email:hover {
            color: #ffffff;
            text-shadow: 0 0 15px #fff, 0 0 30px var(--tech-purple);
        }

        @keyframes whitePulse {
            from { opacity: 0.7; text-shadow: 0 0 5px var(--white-glow); }
            to { opacity: 1; text-shadow: 0 0 15px #fff, 0 0 25px rgba(255, 255, 255, 0.5); }
        }

        .legal-notice {
            font-size: 7pt;
            color: var(--legal-gray);
            max-width: 900px;
            margin: 0 auto;
            line-height: 2;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .hero-logo-svg { height: 130px; }
            .super-domain { font-size: 20pt; }
            .container { padding-top: 5vh; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="container">
    <div class="hero-section">
        <div class="brand-hub">
            <svg class="hero-logo-svg" viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="goldCase" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#FFD700" />
                        <stop offset="100%" style="stop-color:#B8860B" />
                    </linearGradient>
                    <radialGradient id="marsSphere" cx="50%" cy="50%" r="50%" fx="35%" fy="35%">
                        <stop offset="0%" style="stop-color:#FF8C00" />
                        <stop offset="60%" style="stop-color:#E60012" />
                        <stop offset="100%" style="stop-color:#330000" />
                    </radialGradient>
                </defs>

                <rect x="50" y="70" width="140" height="100" rx="15" fill="url(#goldCase)" />
                
                <rect x="62" y="82" width="116" height="76" rx="8" fill="#000" />
                
                <g transform="translate(120, 120)">
                    <circle class="mars-sphere-core" cx="0" cy="0" r="30" />
                </g>
                
                <polygon points="128,120 115,110 115,130" fill="white" opacity="0.9" />
                
                <line x1="120" y1="70" x2="85" y2="25" stroke="#FFD700" stroke-width="2.5" />
                <line x1="120" y1="70" x2="155" y2="25" stroke="#FFD700" stroke-width="2.5" />
                
                <circle cx="178" cy="95" r="5" fill="#332200" />
                <circle cx="178" cy="115" r="5" fill="#332200" />
            </svg>
            
            <div class="hero-title-text">
                <h1 class="super-domain">FOTV.COM</h1>
                <div class="chinese-brand">火视网</div>
            </div>
        </div>

        <div class="mars-narrative">
            <div class="glow-statement">
                Life must be multi-planetary.<br>
                Mars is the archive of our future consciousness.
            </div>
            <div class="sub-narrative">
                文明的延续不应止于摇篮。FOTV 正在构建跨越行星的内容协议，<br>
                在红色荒漠被点燃之前，我们先点燃影像的火种。
            </div>
        </div>
    </div>
</div>

<footer>
    <a href="mailto:cengchengzhi@gmail.com" class="contact-email">cengchengzhi@gmail.com</a>
    
    <div class="legal-notice">
        © 2026 FOTV MEDIA NETWORKS | MARS SECTOR | FOTV® (CLASS 35) <br>
        INITIALIZING MULTI-PLANETARY CONTENT PROTOCOL
    </div>
</footer>

</body>
</html>
