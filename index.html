<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FOTV.COM | 火视网</title>

<style>
:root {
    --red:#ff3b30;
    --deep:#e60012;
    --text:#111;
    --grey:#8e8e93;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:-apple-system,BlinkMacSystemFont;
    background:#fff;
    color:var(--text);
}

/* 顶部 */
.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:26px 30px;
}

.logo{
    font-weight:800;
    letter-spacing:2px;
}

/* 主区域 */
.hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
}

/* FO核心 */
.core{
    width:120px;
    height:120px;
    border-radius:50%;
    background:radial-gradient(circle,var(--red),var(--deep));
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-weight:900;
    font-size:36px;
    position:relative;
}

/* 圆环 */
.ring{
    position:absolute;
    border-radius:50%;
    border:8px solid transparent;
}

.r1{
    width:160px;height:160px;
    border-top-color:rgba(255,59,48,0.4);
    animation:spin 8s linear infinite;
}

.r2{
    width:200px;height:200px;
    border-left-color:rgba(255,59,48,0.25);
    animation:spin2 12s linear infinite;
}

.r3{
    width:240px;height:240px;
    border-bottom-color:rgba(255,59,48,0.15);
    animation:spin 16s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}
@keyframes spin2{
    to{transform:rotate(-360deg);}
}

/* 标题 */
.title{
    margin-top:30px;
    font-size:36px;
    font-weight:800;
}

.sub{
    color:var(--red);
    margin-top:10px;
}

/* 输入框 */
.box{
    margin-top:30px;
    display:flex;
    border:1px solid #eee;
    border-radius:999px;
    overflow:hidden;
}

.box input{
    border:none;
    padding:14px 20px;
    width:260px;
    outline:none;
}

.box button{
    background:var(--red);
    color:#fff;
    border:none;
    padding:0 20px;
    cursor:pointer;
}

/* 卡片 */
.cards{
    display:flex;
    gap:20px;
    padding:60px 20px;
    max-width:1000px;
    margin:auto;
}

.card{
    flex:1;
    padding:24px;
    border-radius:20px;
    border:1px solid #eee;
}

.card h3{
    margin-bottom:10px;
}

/* 底部 */
.footer{
    text-align:center;
    padding:60px 20px;
    border-top:1px solid #eee;
}

.email{
    margin-top:20px;
    display:inline-block;
    color:var(--red);
    text-decoration:none;
    font-weight:600;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">FOTV.COM</div>
</div>

<div class="hero">

    <div style="position:relative">
        <div class="ring r3"></div>
        <div class="ring r2"></div>
        <div class="ring r1"></div>
        <div class="core">FO</div>
    </div>

    <div class="title">火视网</div>
    <div class="sub">精选热播短剧入口</div>

    <div class="box">
        <input id="q" placeholder="输入短剧关键词..." />
        <button onclick="go()">进入</button>
    </div>

</div>

<div class="cards">
    <div class="card">
        <h3>热播短剧</h3>
        <p>精选当前热门短剧内容，覆盖逆袭、甜宠、都市等高热题材。</p>
    </div>

    <div class="card">
        <h3>精选内容</h3>
        <p>持续更新高关注短剧，帮助用户快速发现精彩剧情。</p>
    </div>

    <div class="card">
        <h3>便捷入口</h3>
        <p>更简单的方式进入短剧内容，减少操作路径。</p>
    </div>
</div>

<div class="footer">
    <div style="font-weight:800;font-size:20px;">FOTV.COM｜火视网</div>

    <p style="margin-top:10px;color:#666;">
        专注热播短剧内容，提供清晰直接的观看入口
    </p>

    <!-- 👉 改成你的邮箱 -->
    <a class="email" href="mailto:your@email.com">
        cengchengzhi@gmail.com
    </a>

    <div style="margin-top:20px;color:#aaa;font-size:12px;">
        © 2026 FOTV.COM
    </div>
</div>

<script>
function go(){
    const q=document.getElementById("q").value;

    // 👉 后面你可以改成 CPS链接
    if(q){
        window.location.href="https://www.baidu.com/s?wd="+q;
    }else{
        window.location.href="https://www.baidu.com";
    }
}
</script>

</body>
</html>
