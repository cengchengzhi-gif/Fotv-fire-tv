<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOTV.COM® 火视网 - INITIALIZED</title>
    <style>
        :root {
            --mars-red: #E60012;
            --tech-purple: #C084FC; /* cai.com 同款浅紫 */
            --tech-silver: #FFFFFF;
            --deep-black: #000000;
            --legal-gray: #1a1a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--deep-black);
            color: white;
            overflow-x: hidden;
            height: 100%;
        }

        /* 宇宙深空背景 */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a0010 0%, #000000 100%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            padding-top: 15vh;
        }

        /* 核心品牌展示区 */
        .brand-hub {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 60px;
            position: relative;
        }

        /* 标识：燃烧的金色电视（无背景火，无底座） */
        .hero-logo-svg {
            height: 220px; 
            width: auto;
            filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.2));
            z-index: 2;
        }

        /* 火焰真实燃烧滤镜 */
        .fire-top {
            fill: var(--mars-red);
            filter: url(#realFire);
            animation: flicker 0.12s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 0.8; transform: translateY(0) scaleY(1); }
            100% { opacity: 1; transform: translateY(-2px) scaleY(1.05); }
        }

        /* 品牌文字：移植 cai.com 渐变风格 + 大写域名 */
        .hero-title-text {
            margin-top: 30px; 
            position: relative;
            z-index: 3;
        }

        .super-domain {
            font-size: 50pt; 
            font-weight: 900;
            letter-spacing: -1px;
            margin: 0;
            
            /* 渐变色：银色到紫色的高维度转换 */
            background: linear-gradient(180deg, var(--tech-silver) 30%, var(--tech-purple) 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            text-transform: uppercase; /* 强制大写 */
            line-height: 1.1;
            filter: drop-shadow(0 0 10px rgba(192, 132, 252, 0.3));
        }

        .chinese-brand {
            font-size: 24pt;
            font-weight: bold;
            color: var(--mars-red);
            letter-spacing: 16px;
            margin-top: 12px;
            text-indent: 16px;
            opacity: 0.95;
            filter: drop-shadow(0 0 8px rgba(230, 0, 18, 0.4));
        }

        /* 底部信息 */
        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 40px 0;
            text-align: center;
        }

        .contact-email {
            display: block;
            font-size: 8pt;
            color: #1a1a1a; 
            text-decoration: none;
            letter-spacing: 1px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .contact-email:hover {
            color: var(--tech-purple);
        }

        .legal-notice {
            font-size: 7.5pt;
            color: var(--legal-gray);
            max-width: 900px;
            margin: 0 auto;
            line-height: 2.2;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .hero-logo-svg { height: 160px; }
            .super-domain { font-size: 32pt; }
            .chinese-brand { font-size: 18pt; }
            .container { padding-top: 10vh; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="container">
    <div class="hero-section">
        <div class="brand-hub">
            <svg class="hero-logo-svg" viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="goldCase" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#FFD700" />
                        <stop offset="100%" style="stop-color:#B8860B" />
                    </linearGradient>
                    
                    <filter id="realFire">
                        <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="3" seed="1">
                            <animate attributeName="seed" from="1" to="100" dur="2s" repeatCount="indefinite" />
                        </feTurbulence>
                        <feDisplacementMap in="SourceGraphic" scale="12" />
                    </filter>
                </defs>

                <path class="fire-top" d="M80 60 Q120 -15 160 60 L150 75 L90 75 Z" />
                
                <rect x="50" y="70" width="140" height="100" rx="15" fill="url(#goldCase)" />
                <rect x="62" y="82" width="105" height="76" rx="8" fill="#000" />
                
                <polygon points="125,120 105,105 105,135" fill="url(#goldCase)" />
                
                <line x1="120" y1="70" x2="85" y2="25" stroke="#FFD700" stroke-width="2.5" />
                <line x1="120" y1="70" x2="155" y2="25" stroke="#FFD700" stroke-width="2.5" />
                
                <circle cx="178" cy="95" r="5" fill="#332200" />
                <circle cx="178" cy="115" r="5" fill="#332200" />
            </svg>
            
            <div class="hero-title-text">
                <h1 class="super-domain">FOTV.COM</h1>
                <div class="chinese-brand">火视网</div>
            </div>
        </div>

        <div style="margin-top: 50px; font-size: 14pt; color: #222; letter-spacing: 5px;">
            热门短剧赛道 · 全球流量分发 · 2026 INITIALIZED
        </div>
    </div>
</div>

<footer>
    <a href="mailto:cengchengzhi@gmail.com" class="contact-email">cengchengzhi@gmail.com</a>
    
    <div class="legal-notice">
        © 2026 FOTV MEDIA NETWORKS | FOTV.COM | FOTV® (CLASS 35) <br>
        PROTECTED IN BEIJING / LONDON / SILICON VALLEY
    </div>
</footer>

</body>
</html>
