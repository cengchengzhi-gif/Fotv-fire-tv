<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fotv.com® 火视网 - INITIALIZED</title>
    <style>
        :root {
            --mars-red: #E60012;
            --tech-purple-light: #C084FC; /* cai.com 同款浅紫 */
            --tech-purple-dark: #6366F1;  /* cai.com 同款深紫 */
            --deep-black: #000000;
            --legal-gray: #1a1a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--deep-black);
            color: white;
            overflow-x: hidden;
            height: 100%;
        }

        /* 宇宙深空背景 */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a0010 0%, #000000 100%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            padding-top: 15vh;
        }

        /* 核心品牌展示区 */
        .brand-hub {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 60px;
            position: relative;
        }

        /* 标识：燃烧的金色电视（去背景火） */
        .hero-logo-svg {
            height: 200px; 
            width: auto;
            filter: drop-shadow(0 0 20px rgba(192, 132, 252, 0.2));
            z-index: 2;
        }

        /* 真实火焰燃烧滤镜 */
        .fire-top {
            fill: var(--mars-red);
            filter: url(#realFire);
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 0.8; transform: translateY(0); }
            100% { opacity: 1; transform: translateY(-2px); }
        }

        /* 品牌文字：完美移植 cai.com 风格 */
        .hero-title-text {
            margin-top: 30px; 
            position: relative;
            z-index: 3;
        }

        .super-domain {
            font-size: 52pt; 
            font-weight: 900;
            letter-spacing: -1.5px;
            margin: 0;
            
            /* 渐变色设置 */
            background: linear-gradient(180deg, #FFFFFF 30%, var(--tech-purple-light) 60%, var(--tech-purple-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            text-transform: lowercase; /* 全小写 */
            line-height: 1;
            
            /* 紫色微光 */
            filter: drop-shadow(0 0 12px rgba(99, 102, 241, 0.3));
        }

        .chinese-brand {
            font-size: 24pt;
            font-weight: bold;
            color: var(--mars-red);
            letter-spacing: 16px;
            margin-top: 12px;
            text-indent: 16px;
            opacity: 0.9;
            filter: drop-shadow(0 0 8px rgba(230, 0, 18, 0.4));
        }

        /* 宣传口号：微缩暗光 */
        .promo-text {
            margin-top: 60px;
            font-size: 14pt;
            font-weight: 200;
            color: #333;
            letter-spacing: 5px;
            opacity: 0.6;
        }

        /* 底部置底区域 */
        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 40px 0;
            text-align: center;
        }

        .contact-email {
            display: block;
            font-size: 8pt;
            color: #1a1a1a; 
            text-decoration: none;
            letter-spacing: 1px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .contact-email:hover {
            color: var(--tech-purple-light);
        }

        .legal-notice {
            font-size: 7.5pt;
            color: var(--legal-gray);
            max-width: 900px;
            margin: 0 auto;
            line-height: 2.2;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .hero-logo-svg { height: 140px; }
            .super-domain { font-size: 36pt; }
            .chinese-brand { font-size: 18pt; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="container">
    <div class="hero-section">
        <div class="brand-hub">
            <svg class="hero-logo-svg" viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="goldCase" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#FFD700" />
                        <stop offset="100%" style="stop-color:#B8860B" />
                    </linearGradient>
                    
                    <filter id="realFire">
                        <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="3" seed="1">
                            <animate attributeName="seed" from="1" to="100" dur="2s" repeatCount="indefinite" />
                        </feTurbulence>
                        <feDisplacementMap in="SourceGraphic" scale="10" />
                    </filter>
                </defs>

                <path class="fire-top" d="M80 60 Q120 -10 160 60 L150 75 L90 75 Z" />
                
                <rect x="50" y="70" width="140" height="100" rx="15" fill="url(#goldCase)" />
                <rect x="62" y="82" width="105" height="76" rx="8" fill="#000" />
                
                <polygon points="125,120 105,105 105,135" fill="url(#goldCase)" />
                
                <line x1="120" y1="70" x2="90" y2="30" stroke="#FFD700" stroke-width="2" />
                <line x1="120" y1="70" x2="150" y2="30" stroke="#FFD700" stroke-width="2" />
            </svg>
            
            <div class="hero-title-text">
                <h1 class="super-domain">fotv.com</h1>
                <div class="chinese-brand">火视网</div>
            </div>
        </div>

        <div class="promo-text">
            热门短剧赛道 · 全球流量分发 · 2026 INITIALIZED
        </div>
    </div>
</div>

<footer>
    <a href="mailto:cengchengzhi@gmail.com" class="contact-email">cengchengzhi@gmail.com</a>
    <div class="legal-notice">
        © 2026 fotv media networks | fotv.com | fotv® (class 35) <br>
        protected in beijing / london / silicon valley
    </div>
</footer>

</body>
</html>
