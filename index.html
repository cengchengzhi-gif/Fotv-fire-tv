<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOTV® 火视网 - 全球短剧赛道 INITIALIZED</title>
    <style>
        :root {
            --gold-glow: #ffcc00;
            --fire-red: #ff3300;
            --deep-black: #000000;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', 'Impact', sans-serif;
            background-color: var(--deep-black);
            color: white;
            overflow: hidden;
            height: 100%;
        }

        /* 极强的红色发光背景 */
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, rgba(230, 0, 18, 0.25) 0%, rgba(0, 0, 0, 1) 70%);
            z-index: -1;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        /* 核心品牌徽章容器 */
        .brand-shield {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 实体火焰画布：象火在燃烧 */
        #fireCanvas {
            width: 350px;
            height: 350px;
            filter: drop-shadow(0 0 30px rgba(255, 60, 0, 0.8));
            z-index: 2;
            /* 原地旋转动效 */
            animation: shieldRotate 20s infinite linear;
        }

        @keyframes shieldRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 金属质感文字容器 */
        .text-wrap {
            margin-top: -120px; /* 紧贴火焰底部 */
            z-index: 10;
            position: relative;
        }

        /* FOTV.COM 巨型金属字 */
        .domain-main {
            font-size: 68pt;
            font-weight: 900;
            letter-spacing: -2px;
            margin: 0;
            background: linear-gradient(180deg, #ffffff 20%, #ffcc00 50%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8));
            text-transform: uppercase;
        }

        /* 火视网 红色发光字 */
        .chinese-main {
            font-size: 32pt;
            font-weight: bold;
            color: #fff;
            letter-spacing: 12px;
            margin-top: -10px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 1), 0 0 10px rgba(255, 255, 255, 0.5);
            text-indent: 12px;
        }

        .promo {
            margin-top: 40px;
            font-size: 14pt;
            color: #666;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .contact-mail {
            margin-top: 50px;
            font-size: 18pt;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            transition: 0.3s;
        }

        .contact-mail:hover {
            color: #ffcc00;
        }

        footer {
            position: absolute;
            bottom: 40px;
            font-size: 8pt;
            color: #222;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
    <div class="brand-shield">
        <canvas id="fireCanvas"></canvas>
        
        <div class="text-wrap">
            <h1 class="domain-main">FOTV.com</h1>
            <div class="chinese-main">火视网</div>
        </div>
    </div>

    <div class="promo">热门短剧赛道 · 全球流量分发 · 2026 INITIALIZED</div>
    
    <a href="mailto:cengchengzhi@gmail.com" class="contact-mail">cengchengzhi@gmail.com</a>

    <footer>
        © 2026 FOTV MEDIA NETWORKS | FOTV.COM | REGISTERED TRADEMARK FOTV®
    </footer>
</div>

<script>
    // 实体火焰渲染引擎
    const canvas = document.getElementById('fireCanvas');
    const ctx = canvas.getContext('2d');
    const w = canvas.width = 400;
    const h = canvas.height = 400;

    const particles = [];
    const particleCount = 1500;

    class Particle {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = w / 2 + (Math.random() - 0.5) * 60;
            this.y = h / 2 + 50;
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = -Math.random() * 4 - 2;
            this.life = 1;
            this.size = Math.random() * 15 + 5;
            this.color = Math.random() > 0.5 ? '#ff3300' : '#ffcc00';
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= 0.02;
            if (this.life <= 0) this.reset();
        }
        draw() {
            ctx.globalCompositeOperation = 'lighter';
            ctx.fillStyle = this.color;
            ctx.globalAlpha = this.life;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    for (let i = 0; i < particleCount; i++) particles.push(new Particle());

    function drawShieldBase() {
        // 绘制徽章中心的播放器实体感
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.roundRect(w/2 - 50, h/2 - 35, 100, 70, 15);
        ctx.fill();
        
        // 金色播放三角
        ctx.fillStyle = '#ffcc00';
        ctx.beginPath();
        ctx.moveTo(w/2 + 15, h/2);
        ctx.lineTo(w/2 - 10, h/2 - 15);
        ctx.lineTo(w/2 - 10, h/2 + 15);
        ctx.fill();
    }

    function animate() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        drawShieldBase();
        requestAnimationFrame(animate);
    }
    animate();
</script>

</body>
</html>
