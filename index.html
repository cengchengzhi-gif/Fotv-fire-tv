<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOTV® 火视网 - 全球热门短剧 INITIALIZED</title>
    <style>
        :root {
            --primary-red: #E60012;
            --deep-black: #000000;
            --legal-gray: #333;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', sans-serif;
            background-color: var(--deep-black);
            color: white;
            overflow-x: hidden;
            height: 100%;
        }

        /* 呼吸感深红背景 */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a0000 0%, #000000 100%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            padding-top: 15vh;
        }

        /* 核心品牌徽章容器 */
        .brand-hub {
            display: flex;
            flex-direction: column;
            align-items: center; /* 几何对齐居中 */
            margin-bottom: 60px;
            position: relative;

            /* 关键：视觉对齐修正，标识向左移动一點点，看起來居中 */
            margin-left: -3px; /* 负边距实现向左移动 */
        }

        /* 燃烧标识容器 */
        .logo-wrapper {
            position: relative;
            margin-bottom: -35px; /* 极致靠拢 */
            z-index: 2;
        }

        .hero-logo-svg {
            height: 220px; /* 标识加大 */
            width: auto;
            filter: drop-shadow(0 0 35px rgba(230, 0, 18, 0.4));
        }

        /* 火焰真实燃烧动效 */
        .fire-path {
            fill: var(--primary-red);
            mask-image: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
            mask-size: 100% 200%;
            -webkit-mask-size: 100% 200%;
            /* 组合动画：流动 + 边缘微颤 */
            animation: fireFlowing 2.5s infinite linear, fireFlicker 0.1s infinite alternate;
        }

        @keyframes fireFlowing {
            from { mask-position: 0% 100%; -webkit-mask-position: 0% 100%; }
            to { mask-position: 0% -100%; -webkit-mask-position: 0% -100%; }
        }

        @keyframes fireFlicker {
            from { filter: blur(0px); opacity: 0.95; }
            to { filter: blur(0.5px); opacity: 1; }
        }

        /* 域名小点大写 */
        .super-domain {
            font-size: 38pt; 
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0;
            color: #ffffff;
            text-transform: uppercase;
            opacity: 0.95;
            z-index: 1;
        }

        .chinese-brand {
            font-size: 20pt;
            font-weight: bold;
            color: var(--primary-red);
            letter-spacing: 12px;
            margin-top: 5px;
            text-indent: 12px;
            opacity: 0.9;
        }

        /* 热门短剧宣传文字（金色发光） */
        .promo-text {
            margin-top: 50px;
            font-size: 15pt;
            font-weight: 200;
            color: #666;
            letter-spacing: 6px;
            background: linear-gradient(90deg, #333, #fff, #333);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* 底部区域 */
        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 60px 0;
            background: linear-gradient(to top, #000 0%, transparent 100%);
            text-align: center;
        }

        /* 联系邮件：放在最下面，小字体 */
        .contact-email {
            display: block;
            font-size: 9pt; /* 小字体 */
            color: #444;
            text-decoration: none;
            letter-spacing: 1px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .contact-email:hover {
            color: var(--primary-red);
        }

        .legal-notice {
            font-size: 8pt;
            color: var(--legal-gray);
            max-width: 900px;
            margin: 0 auto;
            line-height: 2;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .hero-logo-svg { height: 160px; }
            .super-domain { font-size: 28pt; margin-top: -20px; }
            .chinese-brand { font-size: 16pt; }
            .container { padding-top: 10vh; }
            footer { position: relative; margin-top: 100px; }
            .brand-hub { margin-left: 0; } /* 移动端回归居中 */
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="container">
    <div class="hero-section">
        <div class="brand-hub">
            <div class="logo-wrapper">
                <svg class="hero-logo-svg" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
                    <path class="fire-path" d="M100 25 Q120 -5 140 25 T170 25 Q180 55 150 85 L120 105 L90 85 Q60 55 80 25" />
                    <polygon points="110,50 110,80 135,65" fill="white" />
                </svg>
            </div>

            <h1 class="super-domain">FOTV.COM</h1>
            <div class="chinese-brand">火视网</div>
        </div>

        <div class="promo-text">热门短剧赛道 · 全球流量分发 · 2026 INITIALIZED</div>
    </div>
</div>

<footer>
    <a href="mailto:cengchengzhi@gmail.com" class="contact-email">cengchengzhi@gmail.com</a>
    
    <div class="legal-notice">
        © 2026 FOTV MEDIA NETWORKS. ALL RIGHTS RESERVED. <br>
        GLOBAL ASSET: FOTV.COM | REGISTERED TRADEMARK: FOTV® (CLASS 35) <br>
        PROTECTED IN BEIJING / LONDON / SILICON VALLEY
    </div>
</footer>

</body>
</html>
