<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOTV® 火视网 - INITIALIZED</title>
    <style>
        :root {
            --primary-red: #E60012;
            --gold-shine: #FFD700;
            --deep-black: #000000;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', sans-serif;
            background-color: var(--deep-black);
            color: white;
            overflow: hidden;
            height: 100%;
        }

        /* 宇宙深处背景 */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a0000 0%, #000000 100%);
            z-index: -1;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        /* 品牌核心区 */
        .brand-hub {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            margin-bottom: 80px;
        }

        /* 电视机标识动画：轻微呼吸感 */
        .logo-wrapper {
            animation: tvFloat 3s infinite ease-in-out;
            z-index: 2;
        }

        @keyframes tvFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .hero-logo-svg {
            height: 280px; /* 加大标识 */
            width: auto;
            filter: drop-shadow(0 0 50px rgba(230, 0, 18, 0.6));
        }

        /* 火焰燃烧动画：三层叠加 */
        .fire-inner {
            fill: var(--gold-shine);
            animation: flicker 0.1s infinite alternate;
        }

        .fire-mid {
            fill: #FF6600;
            animation: fireRise 2s infinite linear;
            transform-origin: center bottom;
        }

        .fire-outer {
            fill: var(--primary-red);
            animation: fireRise 1.5s infinite linear;
            transform-origin: center bottom;
            opacity: 0.8;
        }

        @keyframes fireRise {
            0% { transform: scaleY(1) translateY(0); opacity: 0.8; }
            50% { transform: scaleY(1.2) translateY(-5px); opacity: 1; }
            100% { transform: scaleY(1) translateY(0); opacity: 0.8; }
        }

        @keyframes flicker {
            from { opacity: 0.8; filter: blur(1px); }
            to { opacity: 1; filter: blur(2px); }
        }

        /* 域名与中文：靠拢且协调 */
        .title-group {
            margin-top: -60px; /* 极致靠拢电视机 */
            z-index: 3;
        }

        .super-domain {
            font-size: 42pt; 
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }

        .chinese-brand {
            font-size: 22pt;
            font-weight: bold;
            color: var(--primary-red);
            letter-spacing: 12px;
            margin-top: 5px;
            text-indent: 12px;
            opacity: 0.9;
        }

        /* 宣传语 */
        .promo-text {
            margin-top: 40px;
            font-size: 15pt;
            font-weight: 200;
            color: #555;
            letter-spacing: 5px;
        }

        /* 底部置底区 */
        footer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
        }

        .contact-email {
            display: block;
            font-size: 9pt; /* 小字体 */
            color: #333; /* 隐约可见 */
            text-decoration: none;
            letter-spacing: 1px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .contact-email:hover {
            color: var(--primary-red);
        }

        .legal-notice {
            font-size: 8pt;
            color: #222;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .hero-logo-svg { height: 180px; }
            .super-domain { font-size: 26pt; }
            .chinese-brand { font-size: 16pt; }
            .title-group { margin-top: -40px; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="container">
    <div class="brand-hub">
        <div class="logo-wrapper">
            <svg class="hero-logo-svg" viewBox="0 0 240 220" xmlns="http://www.w3.org/2000/svg">
                <path class="fire-outer" d="M60 60 Q120 -20 180 60 T220 100 L120 140 L20 100 Z" />
                <path class="fire-mid" d="M80 70 Q120 10 160 70 T190 100 L120 130 L50 100 Z" />
                
                <rect x="55" y="60" width="130" height="90" rx="15" fill="#B8860B" stroke="#FFD700" stroke-width="3" />
                <rect x="65" y="70" width="95" height="70" rx="8" fill="#1a0000" stroke="#E60012" stroke-width="2" />
                <line x1="120" y1="60" x2="80" y2="20" stroke="#FFD700" stroke-width="3" stroke-linecap="round" />
                <line x1="120" y1="60" x2="160" y2="20" stroke="#FFD700" stroke-width="3" stroke-linecap="round" />
                <circle fill="#FFD700" cx="172" cy="85" r="5" />
                <circle fill="#FFD700" cx="172" cy="105" r="5" />
                
                <polygon points="125,105 105,90 105,120" fill="white" class="fire-inner" />
            </svg>
        </div>

        <div class="title-group">
            <h1 class="super-domain">FOTV.com</h1>
            <div class="chinese-brand">火视网</div>
        </div>

        <div class="promo-text">热门短剧赛道 · 全球流量分发 · 2026 INITIALIZED</div>
    </div>
</div>

<footer>
    <a href="mailto:cengchengzhi@gmail.com" class="contact-email">cengchengzhi@gmail.com</a>
    <div class="legal-notice">
        © 2026 FOTV MEDIA NETWORKS | FOTV.COM | FOTV® (CLASS 35)
    </div>
</footer>

</body>
</html>
