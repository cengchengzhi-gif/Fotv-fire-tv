<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOTV.com® 火视网 - 全球短剧赛道 INITIALIZED</title>
    <style>
        :root {
            --primary-red: #E60012;
            --gold-light: #FFD700;
            --gold-med: #C5A059;
            --gold-dark: #8B6508;
            --black-bg: #000000;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', sans-serif;
            background-color: var(--black-bg);
            color: white;
            overflow-x: hidden;
            height: 100%;
        }

        /* 极致简约的深色径向背景 */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #050000 0%, #000000 100%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            padding-top: 15vh;
        }

        /* 核心品牌徽章容器 */
        .brand-hub {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 50px;
        }

        /* 复杂的 3D 雕刻风格 SVG */
        .emblem-svg {
            width: 400px; /* 标识加大 */
            height: auto;
            filter: drop-shadow(0 0 30px rgba(255, 60, 0, 0.3)); /* 柔和的发光 */
        }

        /* 金色材质样式 */
        .gold-filigree { fill: var(--gold-dark); }
        .gold-main { fill: url(#goldGrad); }
        .gold-accent { fill: var(--gold-light); }

        /* 电视屏幕：带有球体质感和旋转动效 */
        .screen-circle {
            fill: url(#marsSphere);
            animation: marsRotation 20s infinite linear;
            transform-origin: center center;
        }

        @keyframes marsRotation {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 文本材质雕刻样式 */
        .text-fotv {
            font-size: 50px;
            font-weight: 900;
            font-family: 'Arial Black', Gadget, sans-serif;
            fill: url(#goldGrad);
            letter-spacing: -2px;
        }

        .text-chinese {
            font-size: 26px;
            font-weight: bold;
            fill: url(#goldGrad);
            letter-spacing: 12px;
        }

        /* 热门短剧宣传文字：金色发光 */
        .promo-text {
            margin-top: 50px;
            font-size: 14pt;
            font-weight: 300;
            color: #ddd;
            letter-spacing: 5px;
            background: linear-gradient(90deg, #333, #fff, #333);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .contact-section {
            margin-top: 80px;
            padding-bottom: 80px;
        }

        /* 高清晰度、亮白发光的邮箱地址 */
        .contact-email {
            font-size: 18pt;
            color: #ffffff;
            text-decoration: none;
            font-weight: 200;
            transition: 0.3s;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7); /* 核心发光 */
        }

        .contact-email:hover {
            color: var(--gold-light);
            text-shadow: 0 0 15px var(--gold-light);
        }

        footer {
            padding: 80px 20px;
            background: #000;
            border-top: 1px solid #111;
            text-align: center;
            font-size: 8pt;
            color: #333;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .emblem-svg { width: 250px; }
            .super-domain { font-size: 26pt; }
            .chinese-brand { font-size: 16pt; }
            .promo-text { font-size: 12pt; }
            .contact-email { font-size: 14pt; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="container">
    <div class="hero-section">
        <div class="brand-hub">
            <svg class="emblem-svg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#FFD700" />
                        <stop offset="50%" style="stop-color:#C5A059" />
                        <stop offset="100%" style="stop-color:#8B6508" />
                    </linearGradient>
                    
                    <filter id="screenGlow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="6" result="blur"/>
                        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                    </filter>
                    
                    <radialGradient id="marsSphere" cx="50%" cy="50%" r="50%" fx="35%" fy="35%">
                        <stop offset="0%" style="stop-color:#FFD700" />
                        <stop offset="60%" style="stop-color:#E60012" />
                        <stop offset="100%" style="stop-color:#330000" />
                    </radialGradient>
                </defs>

                <circle class="gold-filigree" cx="250" cy="250" r="230" stroke="#C5A059" stroke-width="4" fill="none"/>

                <g class="movie-elements" transform="translate(180, 180)">
                    <circle cx="20" cy="20" r="20" fill="#8B6508"/>
                    <circle cx="20" cy="20" r="15" fill="none" stroke="#FFD700" stroke-width="2"/>
                    <rect x="15" y="15" width="10" height="10" fill="#FFD700"/>
                    <circle cx="50" cy="40" r="25" fill="#C5A059"/>
                
                    <rect x="0" y="-30" width="30" height="20" fill="#8B6508" rx="3"/>
                    <rect x="5" y="-25" width="20" height="10" fill="#FFD700" rx="1"/>
                
                    <g transform="translate(100, -60)">
                        <path fill="#FFD700" d="M0,0 Q20,-10 30,0 L15,15 Z"/>
                    </g>
                </g>

                <path class="gold-main" d="M100,320 Q120,380 250,380 Q380,380 400,320 Q410,290 250,290 Q90,290 100,320 Z" />
                <path class="gold-accent" d="M110,325 Q130,370 250,370 Q370,370 390,325" fill="none" stroke="#FFD700" stroke-width="2"/>

                <g class="tv-set" transform="translate(250, 200)">
                    <rect x="-60" y="-40" width="120" height="85" rx="15" fill="#C5A059" stroke="#FFD700" stroke-width="3"/>
                    
                    <circle class="screen-circle" cx="-5" cy="5" r="30" filter="url(#screenGlow)" />
                    
                    <circle cx="50" cy="-20" r="5" fill="#8B6508"/>
                    <circle cx="50" cy="0" r="5" fill="#8B6508"/>
                </g>

                <text x="250" y="345" class="text-fotv" text-anchor="middle">FOTV.com</text>
                <text x="250" y="375" class="text-chinese" text-anchor="middle">火视网</text>

                <path class="gold-filigree" d="M250,400 L200,430 L250,460 L300,430 Z" opacity="0.5"/>
            </svg>
        </div>

        <p class="promo-text">热门短剧赛道 · 全球流量分发 · 2026 INITIALIZED</p>
    </div>

    <div class="contact-section">
        <a href="mailto:cengchengzhi@gmail.com" class="contact-email">cengchengzhi@gmail.com</a>
    </div>
</div>

<footer>
    © 2026 FOTV MEDIA NETWORKS | FOTV.COM | REGISTERED TRADEMARK FOTV®
</footer>

</body>
</html>
