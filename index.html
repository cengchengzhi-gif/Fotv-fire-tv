<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOTV.COM® 火视网 - INITIALIZED</title>
    <style>
        :root {
            --mars-red: #E60012;
            --tech-purple: #C084FC; /* cai.com 同款浅紫 */
            --tech-silver: #FFFFFF;
            --deep-black: #000000;
            --legal-gray: #1a1a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--deep-black);
            color: white;
            overflow-x: hidden;
            height: 100%;
        }

        /* 宇宙深空背景，极致简约 */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a0010 0%, #000000 100%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; /* 垂直居中 */
        }

        /* 核心品牌展示区 */
        .brand-hub {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* 标识：冷静的金色电视（彻底去火、去冗余背景） */
        .hero-logo-svg {
            height: 180px; /* 稍微缩小电视体积以配合微缩域名 */
            width: auto;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.15)); /* 极弱的发光 */
            z-index: 2;
        }

        /* 品牌文字：极简布局 */
        .hero-title-text {
            margin-top: 25px; /* 间距毫米级调整 */
            position: relative;
            z-index: 3;
        }

        /* 域名：微缩、大写、银紫渐变 */
        .super-domain {
            font-size: 24pt; /* 域名大幅缩小 */
            font-weight: 900;
            letter-spacing: 0px; /* 缩小后不再需要负间距 */
            margin: 0;
            
            /* 渐变色：保留银色到紫色的科技感 */
            background: linear-gradient(180deg, var(--tech-silver) 30%, var(--tech-purple) 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            text-transform: uppercase; /* 强制大写 */
            line-height: 1.2;
            filter: drop-shadow(0 0 8px rgba(192, 132, 252, 0.25));
        }

        /* 中文品牌名：保持主权红 */
        .chinese-brand {
            font-size: 18pt; /* 相应缩小，保持比例 */
            font-weight: bold;
            color: var(--mars-red);
            letter-spacing: 12px;
            margin-top: 10px;
            text-indent: 12px;
            opacity: 0.9;
            filter: drop-shadow(0 0 6px rgba(230, 0, 18, 0.3));
        }

        /* 底部信息 */
        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 40px 0;
            text-align: center;
        }

        /* 邮箱：极简、深灰 */
        .contact-email {
            display: block;
            font-size: 8pt;
            color: #1a1a1a; 
            text-decoration: none;
            letter-spacing: 1px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .contact-email:hover {
            color: var(--tech-purple);
        }

        .legal-notice {
            font-size: 7pt;
            color: var(--legal-gray);
            max-width: 900px;
            margin: 0 auto;
            line-height: 2;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .hero-logo-svg { height: 140px; }
            .super-domain { font-size: 18pt; }
            .chinese-brand { font-size: 14pt; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="container">
    <div class="hero-section">
        <div class="brand-hub">
            <svg class="hero-logo-svg" viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="goldCase" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#FFD700" />
                        <stop offset="100%" style="stop-color:#B8860B" />
                    </linearGradient>
                </defs>

                <rect x="50" y="70" width="140" height="100" rx="15" fill="url(#goldCase)" />
                
                <rect x="62" y="82" width="105" height="76" rx="8" fill="#000" />
                
                <polygon points="125,120 105,105 105,135" fill="url(#goldCase)" />
                
                <line x1="120" y1="70" x2="85" y2="25" stroke="#FFD700" stroke-width="2.5" />
                <line x1="120" y1="70" x2="155" y2="25" stroke="#FFD700" stroke-width="2.5" />
                
                <circle cx="178" cy="95" r="5" fill="#332200" />
                <circle cx="178" cy="115" r="5" fill="#332200" />
            </svg>
            
            <div class="hero-title-text">
                <h1 class="super-domain">FOTV.COM</h1>
                <div class="chinese-brand">火视网</div>
            </div>
        </div>

        <div style="margin-top: 50px; font-size: 14pt; color: #222; letter-spacing: 5px;">
            热门短剧赛道 · 全球流量分发 · 2026 INITIALIZED
        </div>
    </div>
</div>

<footer>
    <a href="mailto:cengchengzhi@gmail.com" class="contact-email">cengchengzhi@gmail.com</a>
    
    <div class="legal-notice">
        © 2026 FOTV MEDIA NETWORKS | FOTV.COM | FOTV® (CLASS 35) <br>
        PROTECTED IN BEIJING / LONDON / SILICON VALLEY
    </div>
</footer>

</body>
</html>
