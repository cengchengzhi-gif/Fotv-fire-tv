<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOTV® 火视网 - 全球热门短剧 INITIALIZED</title>
    <style>
        :root {
            --mars-red: #E60012;
            --mars-dark: #660000;
            --mars-orange: #FF4D00;
            --deep-black: #000000;
            --legal-gray: #333;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', sans-serif;
            background-color: var(--deep-black);
            color: white;
            overflow-x: hidden;
            height: 100%;
        }

        /* 宇宙深处发光背景 */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #250000 0%, #000000 100%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            padding-top: 15vh;
        }

        /* 核心品牌徽章容器 */
        .brand-hub {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 60px;
            position: relative;
            /* 视觉对齐微调 */
            margin-left: -2px; 
        }

        /* 火星标识容器 */
        .logo-wrapper {
            position: relative;
            margin-bottom: -30px; /* 极致靠拢 */
            z-index: 2;
        }

        .hero-logo-svg {
            height: 220px; /* 标识加大 */
            width: 220px;
            filter: drop-shadow(0 0 50px rgba(230, 0, 18, 0.6));
        }

        /* 火星实体纹理 */
        .mars-sphere {
            fill: url(#marsGradient);
        }

        /* 熊熊燃烧的大气层动效 */
        .burning-aura {
            fill: var(--mars-orange);
            /* 组合动画：不规则扭曲燃烧 */
            animation: marsFlicker 0.15s infinite alternate;
        }

        @keyframes marsFlicker {
            from { filter: url(#fireDistortion) blur(2px); opacity: 0.8; }
            to { filter: url(#fireDistortion) blur(4px); opacity: 1; }
        }

        /* 域名小点大写 */
        .super-domain {
            font-size: 38pt; 
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0;
            color: #ffffff;
            text-transform: uppercase;
            opacity: 0.95;
            z-index: 1;
        }

        .chinese-brand {
            font-size: 20pt;
            font-weight: bold;
            color: var(--mars-red);
            letter-spacing: 12px;
            margin-top: 5px;
            text-indent: 12px;
            opacity: 0.9;
        }

        /* 宣传文字 */
        .promo-text {
            margin-top: 50px;
            font-size: 15pt;
            font-weight: 200;
            color: #555;
            letter-spacing: 6px;
            background: linear-gradient(90deg, #333, #fff, #333);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* 底部区域 */
        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 60px 0;
            background: linear-gradient(to top, #000 0%, transparent 100%);
            text-align: center;
        }

        .contact-email {
            display: block;
            font-size: 9pt;
            color: #444;
            text-decoration: none;
            letter-spacing: 1px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .contact-email:hover {
            color: var(--mars-red);
        }

        .legal-notice {
            font-size: 8pt;
            color: var(--legal-gray);
            max-width: 900px;
            margin: 0 auto;
            line-height: 2;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .hero-logo-svg { height: 160px; width: 160px; }
            .super-domain { font-size: 28pt; margin-top: -20px; }
            .chinese-brand { font-size: 16pt; }
            .container { padding-top: 10vh; }
            footer { position: relative; margin-top: 100px; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="container">
    <div class="hero-section">
        <div class="brand-hub">
            <div class="logo-wrapper">
                <svg class="hero-logo-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="marsGradient" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
                            <stop offset="0%" style="stop-color:#FF6600" />
                            <stop offset="60%" style="stop-color:#E60012" />
                            <stop offset="100%" style="stop-color:#330000" />
                        </radialGradient>
                        
                        <filter id="fireDistortion">
                            <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" seed="1">
                                <animate attributeName="seed" from="1" to="100" dur="2s" repeatCount="indefinite" />
                            </feTurbulence>
                            <feDisplacementMap in="SourceGraphic" scale="15" />
                        </filter>
                    </defs>

                    <circle class="burning-aura" cx="100" cy="100" r="85" />
                    
                    <circle class="mars-sphere" cx="100" cy="100" r="75" />
                    
                    <polygon points="115,100 90,85 90,115" fill="white" style="filter: drop-shadow(0 0 5px white);" />
                </svg>
            </div>

            <h1 class="super-domain">FOTV.COM</h1>
            <div class="chinese-brand">火视网</div>
        </div>

        <div class="promo-text">热门短剧赛道 · 全球流量分发 · 2026 INITIALIZED</div>
    </div>
</div>

<footer>
    <a href="mailto:cengchengzhi@gmail.com" class="contact-email">cengchengzhi@gmail.com</a>
    
    <div class="legal-notice">
        © 2026 FOTV MEDIA NETWORKS. ALL RIGHTS RESERVED. <br>
        GLOBAL ASSET: FOTV.COM | REGISTERED TRADEMARK: FOTV® (CLASS 35) <br>
        PROTECTED IN BEIJING / LONDON / SILICON VALLEY
    </div>
</footer>

</body>
</html>
