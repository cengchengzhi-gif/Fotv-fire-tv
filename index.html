<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOTV® 火视网 - MARS TV INITIALIZED</title>
    <style>
        :root {
            --mars-red: #E60012;
            --mars-orange: #FF4D00;
            --deep-black: #000000;
            --legal-gray: #333;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', sans-serif;
            background-color: var(--deep-black);
            color: white;
            overflow-x: hidden;
            height: 100%;
        }

        /* 宇宙深处发光背景 */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #250000 0%, #000000 100%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            padding-top: 12vh;
        }

        /* 品牌核心区 */
        .brand-hub {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 60px;
            position: relative;
        }

        /* 火星电视标识容器 */
        .logo-wrapper {
            position: relative;
            margin-bottom: -40px; /* 极致靠拢 */
            z-index: 2;
        }

        .hero-logo-svg {
            height: 240px; /* 标识加大 */
            width: auto;
            filter: drop-shadow(0 0 50px rgba(230, 0, 18, 0.5));
        }

        /* 电视机外壳 */
        .tv-case {
            fill: #1a0000;
            stroke: var(--mars-red);
            stroke-width: 2;
        }

        /* 屏幕内部火星熔岩感 */
        .tv-screen {
            fill: url(#marsScreenGrad);
        }

        /* 熊熊燃烧的大气火焰 */
        .fire-aura {
            fill: var(--mars-red);
            mask-image: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
            mask-size: 100% 200%;
            -webkit-mask-size: 100% 200%;
            animation: marsFireFlow 2s infinite linear;
        }

        @keyframes marsFireFlow {
            from { mask-position: 0% 100%; -webkit-mask-position: 0% 100%; }
            to { mask-position: 0% -100%; -webkit-mask-position: 0% -100%; }
        }

        /* 域名：小点、大写、靠拢 */
        .super-domain {
            font-size: 38pt; 
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0;
            color: #ffffff;
            text-transform: uppercase;
            opacity: 0.95;
            z-index: 1;
        }

        /* 中文品牌名 */
        .chinese-brand {
            font-size: 20pt;
            font-weight: bold;
            color: var(--mars-red);
            letter-spacing: 12px;
            margin-top: 5px;
            text-indent: 12px;
            opacity: 0.9;
        }

        /* 宣传口号：流光效果 */
        .promo-text {
            margin-top: 50px;
            font-size: 15pt;
            font-weight: 200;
            color: #666;
            letter-spacing: 6px;
            background: linear-gradient(90deg, #333, #fff, #333);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* 底部置底区域 */
        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 60px 0;
            background: linear-gradient(to top, #000 0%, transparent 100%);
            text-align: center;
        }

        /* 邮箱小写且字号小 */
        .contact-email {
            display: block;
            font-size: 9pt;
            color: #444;
            text-decoration: none;
            letter-spacing: 1px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .contact-email:hover {
            color: var(--mars-red);
        }

        .legal-notice {
            font-size: 8pt;
            color: var(--legal-gray);
            max-width: 900px;
            margin: 0 auto;
            line-height: 2;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .hero-logo-svg { height: 160px; }
            .super-domain { font-size: 28pt; margin-top: -25px; }
            .chinese-brand { font-size: 16pt; }
            .container { padding-top: 10vh; }
            footer { position: relative; margin-top: 100px; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="container">
    <div class="hero-section">
        <div class="brand-hub">
            <div class="logo-wrapper">
                <svg class="hero-logo-svg" viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="marsScreenGrad" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" style="stop-color:#FF6600" />
                            <stop offset="100%" style="stop-color:#330000" />
                        </radialGradient>
                    </defs>
                    
                    <path class="fire-aura" d="M120 10 Q150 -10 180 20 T220 30 Q240 70 200 110 L120 150 L40 110 Q0 70 20 30 T70 10 Z" />
                    
                    <rect class="tv-case" x="50" y="40" width="140" height="100" rx="15" />
                    
                    <rect class="tv-screen" x="60" y="50" width="105" height="80" rx="10" />
                    
                    <circle fill="#333" cx="178" cy="65" r="6" />
                    <circle fill="#333" cx="178" cy="85" r="6" />
                    <rect fill="#333" x="172" y="105" width="12" height="15" rx="2" />
                    
                    <line x1="120" y1="40" x2="90" y2="10" stroke="white" stroke-width="2" />
                    <line x1="120" y1="40" x2="150" y2="10" stroke="white" stroke-width="2" />
                    
                    <polygon points="125,90 100,75 100,105" fill="white" style="filter: drop-shadow(0 0 5px white);" />
                </svg>
            </div>

            <h1 class="super-domain">FOTV.COM</h1>
            <div class="chinese-brand">火视网</div>
        </div>

        <div class="promo-text">热门短剧赛道 · 全球流量分发 · 2026 INITIALIZED</div>
    </div>
</div>

<footer>
    <a href="mailto:cengchengzhi@gmail.com" class="contact-email">cengchengzhi@gmail.com</a>
    
    <div class="legal-notice">
        © 2026 FOTV MEDIA NETWORKS. ALL RIGHTS RESERVED. <br>
        GLOBAL ASSET: FOTV.COM | REGISTERED TRADEMARK: FOTV® (CLASS 35) <br>
        PROTECTED IN BEIJING / LONDON / SILICON VALLEY
    </div>
</footer>

</body>
</html>
