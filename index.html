<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOTV® 火视网 - INITIALIZED</title>
    <style>
        :root {
            --mars-red: #E60012;
            --gold-shine: #FFD700;
            --deep-black: #000000;
            --legal-gray: #1a1a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', sans-serif;
            background-color: var(--deep-black);
            color: white;
            overflow-x: hidden;
            height: 100%;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #100000 0%, #000000 100%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            padding-top: 15vh;
        }

        /* 核心品牌展示区 */
        .brand-hub {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 60px;
            position: relative;
        }

        /* 电视燃烧标识 - 动态 SVG */
        .hero-logo-svg {
            height: 280px; /* 标识加大 */
            width: auto;
            filter: drop-shadow(0 0 30px rgba(230, 0, 18, 0.3));
            z-index: 2;
        }

        /* 火焰真实燃烧滤镜动效 */
        .fire-top {
            fill: var(--mars-red);
            filter: url(#realFire);
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 0.9; transform: scaleY(1); }
            100% { opacity: 1; transform: scaleY(1.05); }
        }

        /* 徽章金色底座 */
        .shield-base {
            fill: url(#goldGradient);
            stroke: #332200;
            stroke-width: 1;
        }

        /* 品牌文字布局：紧凑对齐 */
        .hero-title-text {
            margin-top: -100px; /* 电视与底座极致靠拢 */
            position: relative;
            z-index: 3;
        }

        .super-domain {
            font-size: 42pt; 
            font-weight: 900;
            letter-spacing: -1px;
            margin: 0;
            color: #ffffff;
            text-transform: uppercase;
            line-height: 1;
        }

        .chinese-brand {
            font-size: 22pt;
            font-weight: bold;
            color: var(--mars-red);
            letter-spacing: 15px;
            margin-top: 8px;
            text-indent: 15px;
            opacity: 0.95;
        }

        /* 宣传口号 */
        .promo-text {
            margin-top: 60px;
            font-size: 15pt;
            font-weight: 200;
            color: #444;
            letter-spacing: 6px;
            background: linear-gradient(90deg, #222, #fff, #222);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* 底部置底区域 */
        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 40px 0;
            text-align: center;
        }

        /* 邮箱：极简、小写、深灰色 */
        .contact-email {
            display: block;
            font-size: 8pt;
            color: #1a1a1a; 
            text-decoration: none;
            letter-spacing: 1px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .contact-email:hover {
            color: var(--mars-red);
        }

        .legal-notice {
            font-size: 7.5pt;
            color: var(--legal-gray);
            max-width: 900px;
            margin: 0 auto;
            line-height: 2;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .hero-logo-svg { height: 180px; }
            .super-domain { font-size: 28pt; }
            .chinese-brand { font-size: 16pt; }
            .hero-title-text { margin-top: -60px; }
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="container">
    <div class="hero-section">
        <div class="brand-hub">
            <svg class="hero-logo-svg" viewBox="0 0 400 350" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#FFD700" />
                        <stop offset="50%" style="stop-color:#C5A059" />
                        <stop offset="100%" style="stop-color:#8B6508" />
                    </linearGradient>
                    
                    <filter id="realFire">
                        <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="3" seed="1">
                            <animate attributeName="seed" from="1" to="100" dur="1.5s" repeatCount="indefinite" />
                        </feTurbulence>
                        <feDisplacementMap in="SourceGraphic" scale="12" />
                    </filter>
                </defs>

                <path class="fire-top" d="M140 100 Q160 30 200 60 T260 100 L240 120 L160 120 Z" />
                
                <rect x="130" y="110" width="140" height="100" rx="15" fill="#C5A059" stroke="#FFD700" stroke-width="2" />
                <rect x="142" y="122" width="100" height="76" rx="8" fill="#000" />
                
                <polygon points="205,160 185,145 185,175" fill="white" />
                
                <line x1="200" y1="110" x2="160" y2="70" stroke="#FFD700" stroke-width="2" />
                <line x1="200" y1="110" x2="240" y2="70" stroke="#FFD700" stroke-width="2" />

                <path class="shield-base" d="M50,230 Q200,210 350,230 L370,280 Q200,340 30,280 Z" />
            </svg>
            
            <div class="hero-title-text">
                <h1 class="super-domain">FOTV.COM</h1>
                <div class="chinese-brand">火视网</div>
            </div>
        </div>

        <div class="promo-text">热门短剧赛道 · 全球流量分发 · 2026 INITIALIZED</div>
    </div>
</div>

<footer>
    <a href="mailto:cengchengzhi@gmail.com" class="contact-email">cengchengzhi@gmail.com</a>
    
    <div class="legal-notice">
        © 2026 FOTV MEDIA NETWORKS | FOTV.COM | FOTV® (CLASS 35) <br>
        PROTECTED IN BEIJING / LONDON / SILICON VALLEY
    </div>
</footer>

</body>
</html>
